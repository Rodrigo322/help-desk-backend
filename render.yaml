services:
  - type: web
    name: ticket-system-backend
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
